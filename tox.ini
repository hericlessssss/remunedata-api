[tox]
envlist = py312
skipsdist = false
isolated_build = true

[testenv]
deps =
    .[dev]
commands =
    # Rodar testes com cobertura
    coverage run -m pytest {posargs:tests/} -v --tb=short
    coverage report -m
    coverage xml -o coverage.xml

[testenv:lint]
deps =
    .[dev]
commands =
    ruff check app/ tests/
    black --check app/ tests/
    isort --check-only app/ tests/

[testenv:format]
deps =
    .[dev]
commands =
    black app/ tests/
    isort app/ tests/
