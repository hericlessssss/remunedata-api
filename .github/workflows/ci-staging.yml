name: CI Staging

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]

jobs:
  lint:
    name: "Lint & Estilo"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Executar Ruff
        run: ruff check app tests && ruff format --check app tests

  test:
    name: "Testes e Cobertura"
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: df_remuneration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Executar Pytest com Cobertura
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/df_remuneration_test
          DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@localhost:5432/df_remuneration_test
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: testing
        run: pytest --cov=app --cov-report=term-missing
