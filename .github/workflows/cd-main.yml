# .github/workflows/cd-main.yml
name: CD Main

on:
  push:
    branches: [ main ]

jobs:
  lint:
    name: "Lint & Estilo"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Executar Ruff
        run: ruff check app tests && ruff format --check app tests

  test:
    name: "Testes e Cobertura"
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: df_remuneration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Executar Migrations
        env:
          DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@localhost:5432/df_remuneration_test
        run: alembic upgrade head
      - name: Executar Pytest com Cobertura
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/df_remuneration_test
          DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@localhost:5432/df_remuneration_test
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: testing
        run: pytest --cov=app --cov-report=term-missing

  deploy:
    name: "Build & Deploy"
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=long
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify Deploy
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Triggering Coolify webhook..."
          curl -X POST "${{ secrets.COOLIFY_WEBHOOK }}"
