services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: df_remuneration_app
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # Mount do código para hot-reload em desenvolvimento
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - df_network

  postgres:
    image: postgres:16-alpine
    container_name: df_remuneration_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-df_remuneration}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-df_remuneration}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - df_network

  redis:
    image: redis:7-alpine
    container_name: df_remuneration_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - df_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: df_remuneration_worker
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - df_network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: df_remuneration_scheduler
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - df_network

volumes:
  postgres_data:
  redis_data:

networks:
  df_network:
    driver: bridge
