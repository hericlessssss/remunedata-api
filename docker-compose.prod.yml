# docker-compose.prod.yml
# Versão FINAL para o "Docker Compose Stack" do Coolify v4
# Inclui: API, Worker, Scheduler, Postgres e Redis com Persistência.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-remunedata_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pg_prod_9XkL2mP5nR8q}
      POSTGRES_DB: ${POSTGRES_DB:-remunedata_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/hericlessssss/remunedata-api:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-remunedata_admin}:${POSTGRES_PASSWORD:-pg_prod_9XkL2mP5nR8q}@postgres:5432/${POSTGRES_DB:-remunedata_prod}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-remunedata_admin}:${POSTGRES_PASSWORD:-pg_prod_9XkL2mP5nR8q}@postgres:5432/${POSTGRES_DB:-remunedata_prod}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      LOG_LEVEL: INFO
      CORS_ORIGINS: ${CORS_ORIGINS:-["*"]}
    # Porta interna 8000 mapeada automaticamente pelo Proxy do Coolify
    restart: unless-stopped

  worker:
    image: ghcr.io/hericlessssss/remunedata-api:latest
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-remunedata_admin}:${POSTGRES_PASSWORD:-pg_prod_9XkL2mP5nR8q}@postgres:5432/${POSTGRES_DB:-remunedata_prod}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      LOG_LEVEL: INFO
    restart: unless-stopped

  scheduler:
    image: ghcr.io/hericlessssss/remunedata-api:latest
    command: celery -A app.core.celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-remunedata_admin}:${POSTGRES_PASSWORD:-pg_prod_9XkL2mP5nR8q}@postgres:5432/${POSTGRES_DB:-remunedata_prod}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      LOG_LEVEL: INFO
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
