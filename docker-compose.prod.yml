# docker-compose.prod.yml
# Versão FINAL CORRIGIDA (V2) para o "Docker Compose Stack" do Coolify v4
# Força a reinicialização do banco com as senhas corretas (V2).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-remunedata_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pg_prod_9XkL2mP5nR8q}
      POSTGRES_DB: ${POSTGRES_DB:-remunedata_prod}
    volumes:
      # Mudado para _v2 para forçar o Postgres a ignorar dados antigos e usar a senha nova
      - postgres_data_v2:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/hericlessssss/remunedata-api:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Sincronizado com as variáveis acima
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-remunedata_admin}:${POSTGRES_PASSWORD:-pg_prod_9XkL2mP5nR8q}@postgres:5432/${POSTGRES_DB:-remunedata_prod}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-remunedata_admin}:${POSTGRES_PASSWORD:-pg_prod_9XkL2mP5nR8q}@postgres:5432/${POSTGRES_DB:-remunedata_prod}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      LOG_LEVEL: INFO
      CORS_ORIGINS: ${CORS_ORIGINS:-["*"]}
    # Porta externa 8000 removida: deixe o Proxy (Caddy/Traefik) do Coolify cuidar do IP via Dominio
    restart: unless-stopped

  worker:
    image: ghcr.io/hericlessssss/remunedata-api:latest
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-remunedata_admin}:${POSTGRES_PASSWORD:-pg_prod_9XkL2mP5nR8q}@postgres:5432/${POSTGRES_DB:-remunedata_prod}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      LOG_LEVEL: INFO
    restart: unless-stopped

  scheduler:
    image: ghcr.io/hericlessssss/remunedata-api:latest
    command: celery -A app.core.celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-remunedata_admin}:${POSTGRES_PASSWORD:-pg_prod_9XkL2mP5nR8q}@postgres:5432/${POSTGRES_DB:-remunedata_prod}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      LOG_LEVEL: INFO
    restart: unless-stopped

volumes:
  postgres_data_v2: # Nome do novo volume
  redis_data:
