# docker-compose.prod.yml
# Estratégia resiliente para Coolify v4.0.0-beta.463

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-remunedata_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?database password required}
      POSTGRES_DB: ${POSTGRES_DB:-remunedata_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?redis password required}
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/hericlessssss/remunedata-api:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:?DATABASE_URL_SYNC required}
      DB_HOST: db
    command: alembic upgrade head
    restart: "no"

  api:
    image: ghcr.io/hericlessssss/remunedata-api:latest
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL required}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:?DATABASE_URL_SYNC required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL required}
      APP_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-["*"]}
      LOG_LEVEL: INFO
      DB_HOST: db
      REDIS_HOST: redis
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\").read()' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  worker:
    image: ghcr.io/hericlessssss/remunedata-api:latest
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL required}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:?DATABASE_URL_SYNC required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL required}
      APP_ENV: production
      LOG_LEVEL: INFO
      DB_HOST: db
      REDIS_HOST: redis
    restart: unless-stopped

  scheduler:
    image: ghcr.io/hericlessssss/remunedata-api:latest
    command: celery -A app.core.celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL required}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC:?DATABASE_URL_SYNC required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL required}
      APP_ENV: production
      LOG_LEVEL: INFO
      DB_HOST: db
      REDIS_HOST: redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
