# Alembic Configuration File
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Caminho para a pasta de versões (migrations)
script_location = alembic

# Formato dos arquivos de migração: {timestamp}_{slug}.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# URL de conexão síncrona para Alembic (lida da variável de ambiente)
# A URL aqui é sobrescrita pelo env.py via variável de ambiente DATABASE_URL_SYNC
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/df_remuneration

# ─── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
