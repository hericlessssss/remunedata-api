<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Coletor de Remuneração DF</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --background: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0, transparent 50%);
        }

        header {
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 2rem;
        }

        .chart-container {
            min-height: 400px;
        }

        .chart-title {
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--text-dim);
        }

        .filters {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        select {
            background: var(--surface);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            outline: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Portal Transparência DF</h1>
            <p style="color: var(--text-dim)">Analíticos de Remuneração de Servidores</p>
        </div>
        <div class="filters">
            <label for="yearSelect">Ano:</label>
            <select id="yearSelect" onchange="refreshData(this.value)">
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
            </select>
        </div>
    </header>

    <div class="stats-grid">
        <div class="card">
            <p class="stat-label">Total de Servidores</p>
            <p class="stat-value" id="totalServidores">-</p>
        </div>
        <div class="card">
            <p class="stat-label">Média Salarial</p>
            <p class="stat-value" id="mediaSalarial">-</p>
        </div>
        <div class="card">
            <p class="stat-label">Gasto Bruto Mensal</p>
            <p class="stat-value" id="gastoTotal">-</p>
        </div>
    </div>

    <div class="charts-grid">
        <div class="card chart-container">
            <h2 class="chart-title">Maiores Órgãos por Servidores</h2>
            <canvas id="orgaosChart"></canvas>
        </div>
        <div class="card chart-container">
            <h2 class="chart-title">Distribuição do Gasto Total</h2>
            <canvas id="spendingChart"></canvas>
        </div>
    </div>

    <script>
        let orgaosChart, spendingChart;

        async function refreshData(year) {
            try {
                const response = await fetch(`/api/v1/remuneration/summary?ano=${year}`);
                const data = await response.json();

                // Update Stats
                document.getElementById('totalServidores').innerText = data.total_servidores.toLocaleString('pt-BR');
                document.getElementById('mediaSalarial').innerText = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(data.media_salarial);
                document.getElementById('gastoTotal').innerText = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', notation: 'compact' }).format(data.total_gasto_bruto);

                // Update Charts
                updateCharts(data);
            } catch (error) {
                console.error('Error fetching dashboard data:', error);
            }
        }

        function updateCharts(data) {
            const labels = data.top_orgaos.map(o => o.orgao_nome);
            const counts = data.top_orgaos.map(o => o.count);

            // Chart 1: Bar
            if (orgaosChart) orgaosChart.destroy();
            const ctx1 = document.getElementById('orgaosChart').getContext('2d');
            orgaosChart = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Nº Servidores',
                        data: counts,
                        backgroundColor: 'rgba(99, 102, 241, 0.6)',
                        borderColor: '#6366f1',
                        borderWidth: 1,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            // Chart 2: Doughnut
            if (spendingChart) spendingChart.destroy();
            const ctx2 = document.getElementById('spendingChart').getContext('2d');
            spendingChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: counts,
                        backgroundColor: [
                            '#6366f1', '#a855f7', '#ec4899', '#f43f5e', '#f59e0b'
                        ],
                        borderWidth: 0,
                        hoverOffset: 20
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#f8fafc', padding: 20, font: { family: 'Outfit' } } }
                    },
                    cutout: '70%'
                }
            });
        }

        // Initial Load
        refreshData(2025);
    </script>
</body>
</html>
